<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Justblr Matrix - Web Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f0f23; color: #e4e4e7; min-height: 100vh; }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(102,126,234,0.2); border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .link-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .link-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 48px; max-width: 420px; width: 100%; text-align: center; }
    .link-icon { width: 80px; height: 80px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .link-title { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 12px; }
    .link-subtitle { font-size: 15px; color: #a1a1aa; margin-bottom: 32px; line-height: 1.6; }
    .code-input-group { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
    .code-input { width: 48px; height: 60px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; font-size: 24px; font-weight: 600; color: #fff; text-align: center; outline: none; }
    .code-input:focus { border-color: #667eea; background: rgba(102,126,234,0.1); }
    .link-button { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 12px; font-size: 16px; font-weight: 600; color: #fff; cursor: pointer; }
    .link-button:disabled { opacity: 0.5; cursor: not-allowed; }
    .link-error { color: #ef4444; font-size: 14px; margin-top: 16px; }
    .dashboard { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
    .header h1 { font-size: 28px; font-weight: 700; color: #fff; }
    .header p { font-size: 14px; color: #71717a; }
    .header-actions { display: flex; gap: 12px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #e4e4e7; }
    .btn-danger { background: rgba(239,68,68,0.1); color: #ef4444; padding: 8px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 20px; cursor: pointer; }
    .stat-card:hover { background: rgba(255,255,255,0.06); }
    .stat-card.active { border-color: #667eea; background: rgba(102,126,234,0.1); }
    .stat-card h3 { font-size: 24px; color: #fff; }
    .stat-card p { font-size: 13px; color: #71717a; }
    .section-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 24px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .section-title { font-size: 18px; font-weight: 600; color: #fff; }
    .reminder-list { display: flex; flex-direction: column; gap: 12px; max-height: 500px; overflow-y: auto; }
    .reminder-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; }
    .reminder-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .type-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .type-badge.call { background: rgba(34,197,94,0.15); color: #22c55e; }
    .type-badge.sms { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .type-badge.whatsapp { background: rgba(37,211,102,0.15); color: #25d366; }
    .type-badge.meet { background: rgba(168,85,247,0.15); color: #a855f7; }
    .type-badge.deskwork { background: rgba(249,115,22,0.15); color: #f97316; }
    .reminder-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .reminder-meta { font-size: 12px; color: #71717a; }
    .empty-state { text-align: center; padding: 48px; color: #71717a; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <script>
    const API_URL = 'https://justblr-backend.onrender.com/api';
    let deviceId = localStorage.getItem('justblr_device_id');

    function render() {
      if (deviceId) {
        showDashboard();
      } else {
        showLinkScreen();
      }
    }

    function showLinkScreen() {
      document.getElementById('app').innerHTML = `
        <div class="link-screen">
          <div class="link-card">
            <div class="link-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
            </div>
            <h2 class="link-title">Link Your Mobile</h2>
            <p class="link-subtitle">Enter the 6-digit code from your Justblr Matrix mobile app</p>
            <div class="code-input-group">
              ${[0,1,2,3,4,5].map(i => `<input type="text" class="code-input" maxlength="1" data-index="${i}" inputmode="numeric">`).join('')}
            </div>
            <button class="link-button" id="linkBtn" disabled>Link Device</button>
            <p class="link-error hidden" id="linkError"></p>
          </div>
        </div>
      `;

      const inputs = document.querySelectorAll('.code-input');
      const linkBtn = document.getElementById('linkBtn');
      const linkError = document.getElementById('linkError');

      inputs.forEach((input, idx) => {
        input.addEventListener('input', (e) => {
          const val = e.target.value.replace(/[^0-9]/g, '');
          e.target.value = val;
          if (val && idx < 5) inputs[idx + 1].focus();
          checkCode();
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && idx > 0) {
            inputs[idx - 1].focus();
          }
        });
      });

      function checkCode() {
        const code = Array.from(inputs).map(i => i.value).join('');
        linkBtn.disabled = code.length !== 6;
      }

      linkBtn.addEventListener('click', async () => {
        const code = Array.from(inputs).map(i => i.value).join('');
        linkBtn.disabled = true;
        linkBtn.textContent = 'Verifying...';
        linkError.classList.add('hidden');

        try {
          const res = await fetch(`${API_URL}/sync/verify-code`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sync_code: code })
          });
          const data = await res.json();
          if (data.device_id) {
            deviceId = data.device_id;
            localStorage.setItem('justblr_device_id', deviceId);
            render();
          } else {
            throw new Error(data.detail || 'Invalid code');
          }
        } catch (err) {
          linkError.textContent = err.message || 'Invalid or expired code';
          linkError.classList.remove('hidden');
          linkBtn.disabled = false;
          linkBtn.textContent = 'Link Device';
        }
      });
    }

    async function showDashboard() {
      document.getElementById('app').innerHTML = `
        <div class="dashboard">
          <div class="header">
            <div>
              <h1>Justblr Matrix</h1>
              <p>Web Dashboard</p>
            </div>
            <div class="header-actions">
              <button class="btn btn-secondary" id="refreshBtn">Refresh</button>
              <button class="btn btn-secondary" id="unlinkBtn">Unlink</button>
            </div>
          </div>
          <div class="stats-grid" id="stats"></div>
          <div class="section-card">
            <div class="section-header">
              <h2 class="section-title">Your Reminders</h2>
            </div>
            <div id="reminderList"><div class="loading"><div class="spinner"></div></div></div>
          </div>
        </div>
      `;

      document.getElementById('refreshBtn').onclick = () => loadReminders();
      document.getElementById('unlinkBtn').onclick = () => {
        localStorage.removeItem('justblr_device_id');
        deviceId = null;
        render();
      };

      loadReminders();
    }

    async function loadReminders() {
      try {
        const res = await fetch(`${API_URL}/reminders?device_id=${deviceId}`);
        const reminders = await res.json();

        const stats = {
          total: reminders.length,
          call: reminders.filter(r => r.reminder_type === 'call').length,
          whatsapp: reminders.filter(r => r.reminder_type === 'whatsapp').length,
          meet: reminders.filter(r => r.reminder_type === 'meet').length
        };

        document.getElementById('stats').innerHTML = `
          <div class="stat-card"><h3>${stats.total}</h3><p>Total</p></div>
          <div class="stat-card"><h3>${stats.call}</h3><p>Calls</p></div>
          <div class="stat-card"><h3>${stats.whatsapp}</h3><p>WhatsApp</p></div>
          <div class="stat-card"><h3>${stats.meet}</h3><p>Meetings</p></div>
        `;

        if (reminders.length === 0) {
          document.getElementById('reminderList').innerHTML = `<div class="empty-state"><p>No reminders yet</p></div>`;
          return;
        }

        document.getElementById('reminderList').innerHTML = `
          <div class="reminder-list">
            ${reminders.map(r => `
              <div class="reminder-card">
                <div class="reminder-header">
                  <span class="type-badge ${r.reminder_type}">${r.reminder_type}</span>
                  <button class="btn btn-danger" onclick="deleteReminder('${r.id}')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                  </button>
                </div>
                <div class="reminder-title">${r.title}</div>
                <div class="reminder-meta">${r.contact_name || ''} ${r.contact_phone ? '• ' + r.contact_phone : ''}</div>
                <div class="reminder-meta">${new Date(r.scheduled_time).toLocaleString()}</div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) {
        document.getElementById('reminderList').innerHTML = `<div class="empty-state"><p>Error loading reminders</p></div>`;
      }
    }

    async function deleteReminder(id) {
      if (!confirm('Delete this reminder?')) return;
      try {
        await fetch(`${API_URL}/reminders/${id}`, { method: 'DELETE' });
        loadReminders();
      } catch (err) {
        alert('Failed to delete');
      }
    }

    render();
  </script>
</body>
</html>
