<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Justblr Matrix - Web Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f0f23; color: #e4e4e7; min-height: 100vh; }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(102,126,234,0.2); border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .link-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .link-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 48px; max-width: 420px; width: 100%; text-align: center; }
    .link-icon { width: 80px; height: 80px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .link-title { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 12px; }
    .link-subtitle { font-size: 15px; color: #a1a1aa; margin-bottom: 32px; line-height: 1.6; }
    .code-input-group { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
    .code-input { width: 48px; height: 60px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; font-size: 24px; font-weight: 600; color: #fff; text-align: center; outline: none; }
    .code-input:focus { border-color: #667eea; background: rgba(102,126,234,0.1); }
    .link-button { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 12px; font-size: 16px; font-weight: 600; color: #fff; cursor: pointer; }
    .link-button:disabled { opacity: 0.5; cursor: not-allowed; }
    .link-error { color: #ef4444; font-size: 14px; margin-top: 16px; }
    .link-instructions { margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.1); text-align: left; }
    .link-instructions h4 { font-size: 14px; color: #a1a1aa; margin-bottom: 12px; }
    .link-instructions ol { font-size: 13px; color: #71717a; padding-left: 20px; }
    .link-instructions li { margin-bottom: 8px; }
    .dashboard { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
    .header h1 { font-size: 28px; font-weight: 700; color: #fff; }
    .header p { font-size: 14px; color: #71717a; }
    .header-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(102,126,234,0.3); }
    .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #e4e4e7; }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .btn-danger { background: rgba(239,68,68,0.1); color: #ef4444; padding: 8px 12px; }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-success { background: rgba(34,197,94,0.15); color: #22c55e; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.2s; }
    .stat-card:hover { background: rgba(255,255,255,0.06); transform: translateY(-2px); }
    .stat-card.active { border-color: #667eea; background: rgba(102,126,234,0.1); }
    .stat-card h3 { font-size: 28px; color: #fff; font-weight: 700; }
    .stat-card p { font-size: 13px; color: #71717a; margin-top: 4px; }
    .section-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 24px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .section-title { font-size: 18px; font-weight: 600; color: #fff; }
    .reminder-list { display: flex; flex-direction: column; gap: 12px; max-height: 600px; overflow-y: auto; }
    .reminder-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; transition: all 0.2s; }
    .reminder-card:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }
    .reminder-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
    .reminder-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .type-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .type-badge.call { background: rgba(34,197,94,0.15); color: #22c55e; }
    .type-badge.sms { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .type-badge.whatsapp { background: rgba(37,211,102,0.15); color: #25d366; }
    .type-badge.meet { background: rgba(168,85,247,0.15); color: #a855f7; }
    .type-badge.deskwork { background: rgba(249,115,22,0.15); color: #f97316; }
    .reminder-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .reminder-meta { font-size: 12px; color: #71717a; margin-bottom: 4px; }
    .reminder-notes { font-size: 13px; color: #a1a1aa; margin-top: 8px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 8px; }
    .empty-state { text-align: center; padding: 48px; color: #71717a; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-content { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 32px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-title { font-size: 20px; font-weight: 700; color: #fff; }
    .modal-close { background: none; border: none; color: #71717a; cursor: pointer; font-size: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: #a1a1aa; margin-bottom: 8px; }
    .form-input, .form-select, .form-textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 14px; font-size: 14px; color: #fff; outline: none; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #667eea; }
    .form-textarea { resize: vertical; min-height: 80px; }
    .type-selector { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .type-option { padding: 12px 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: transparent; cursor: pointer; text-align: center; transition: all 0.2s; color: #fff; }
    .type-option:hover { background: rgba(255,255,255,0.05); }
    .type-option.selected { border-color: #667eea; background: rgba(102,126,234,0.1); }
    .type-option span { display: block; font-size: 11px; color: #a1a1aa; margin-top: 4px; }
    .contact-picker { position: relative; }
    .contact-results { position: absolute; top: 100%; left: 0; right: 0; background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; margin-top: 4px; max-height: 200px; overflow-y: auto; z-index: 10; }
    .contact-item { padding: 12px 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .contact-item:hover { background: rgba(255,255,255,0.05); }
    .contact-name { font-size: 14px; color: #fff; }
    .contact-phone { font-size: 12px; color: #71717a; }
    .hidden { display: none !important; }
    @media (max-width: 600px) {
      .type-selector { grid-template-columns: repeat(3, 1fr); }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .header-actions { width: 100%; }
      .btn { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>
  <div id="app"><div class="loading"><div class="spinner"></div></div></div>
  <script>
    const API_URL = 'https://justblr-backend.onrender.com/api';
    let deviceId = localStorage.getItem('justblr_device_id');
    let reminders = [];
    let contacts = [];
    let filterType = null;

    function render() {
      deviceId ? showDashboard() : showLinkScreen();
    }

    function showLinkScreen() {
      document.getElementById('app').innerHTML = `
        <div class="link-screen">
          <div class="link-card">
            <div class="link-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></div>
            <h2 class="link-title">Link Your Mobile</h2>
            <p class="link-subtitle">Enter the 6-digit code from your Justblr Matrix mobile app</p>
            <div class="code-input-group">${[0,1,2,3,4,5].map(i => `<input type="text" class="code-input" maxlength="1" data-index="${i}" inputmode="numeric">`).join('')}</div>
            <button class="link-button" id="linkBtn" disabled>Link Device</button>
            <p class="link-error hidden" id="linkError"></p>
            <div class="link-instructions">
              <h4>How to get the code:</h4>
              <ol>
                <li>Open Justblr Matrix app on your phone</li>
                <li>Tap "Desktop" icon in the top-right</li>
                <li>Enter the 6-digit code shown here</li>
              </ol>
            </div>
          </div>
        </div>`;
      const inputs = document.querySelectorAll('.code-input');
      const linkBtn = document.getElementById('linkBtn');
      const linkError = document.getElementById('linkError');
      inputs.forEach((input, idx) => {
        input.addEventListener('input', (e) => {
          e.target.value = e.target.value.replace(/[^0-9]/g, '');
          if (e.target.value && idx < 5) inputs[idx + 1].focus();
          linkBtn.disabled = Array.from(inputs).map(i => i.value).join('').length !== 6;
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && idx > 0) inputs[idx - 1].focus();
        });
      });
      linkBtn.addEventListener('click', async () => {
        const code = Array.from(inputs).map(i => i.value).join('');
        linkBtn.disabled = true; linkBtn.textContent = 'Verifying...'; linkError.classList.add('hidden');
        try {
          const res = await fetch(`${API_URL}/sync/verify-code`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sync_code: code }) });
          const data = await res.json();
          if (data.device_id) { deviceId = data.device_id; localStorage.setItem('justblr_device_id', deviceId); render(); }
          else throw new Error(data.detail || 'Invalid code');
        } catch (err) { linkError.textContent = err.message || 'Invalid or expired code'; linkError.classList.remove('hidden'); linkBtn.disabled = false; linkBtn.textContent = 'Link Device'; }
      });
    }

    async function showDashboard() {
      document.getElementById('app').innerHTML = `
        <div class="dashboard">
          <div class="header">
            <div><h1>Justblr Matrix</h1><p>Web Dashboard</p></div>
            <div class="header-actions">
              <button class="btn btn-primary" id="addBtn">+ New Reminder</button>
              <button class="btn btn-secondary" id="refreshBtn">Refresh</button>
              <button class="btn btn-secondary" id="unlinkBtn">Unlink</button>
            </div>
          </div>
          <div class="stats-grid" id="stats"></div>
          <div class="section-card">
            <div class="section-header"><h2 class="section-title">Your Reminders</h2><div id="filterInfo"></div></div>
            <div id="reminderList"><div class="loading"><div class="spinner"></div></div></div>
          </div>
        </div>
        <div id="modalContainer"></div>`;
      document.getElementById('addBtn').onclick = () => openModal();
      document.getElementById('refreshBtn').onclick = loadReminders;
      document.getElementById('unlinkBtn').onclick = () => { if(confirm('Unlink?')) { localStorage.removeItem('justblr_device_id'); deviceId = null; render(); }};
      await loadReminders();
      await loadContacts();
    }

    async function loadContacts() {
      try { const res = await fetch(`${API_URL}/sync/contacts/${deviceId}`); contacts = (await res.json()).contacts || []; } catch(e) { contacts = []; }
    }

    async function loadReminders() {
      try {
        const res = await fetch(`${API_URL}/reminders?device_id=${deviceId}`);
        reminders = await res.json();
        renderStats(); renderReminders();
      } catch(e) { document.getElementById('reminderList').innerHTML = '<div class="empty-state">Error loading</div>'; }
    }

    function renderStats() {
      const stats = { total: reminders.length, call: reminders.filter(r=>r.reminder_type==='call').length, sms: reminders.filter(r=>r.reminder_type==='sms').length, whatsapp: reminders.filter(r=>r.reminder_type==='whatsapp').length, meet: reminders.filter(r=>r.reminder_type==='meet').length, deskwork: reminders.filter(r=>r.reminder_type==='deskwork').length };
      document.getElementById('stats').innerHTML = `
        <div class="stat-card ${filterType===null?'active':''}" onclick="setFilter(null)"><h3>${stats.total}</h3><p>Total</p></div>
        <div class="stat-card ${filterType==='call'?'active':''}" onclick="setFilter('call')"><h3>${stats.call}</h3><p>Calls</p></div>
        <div class="stat-card ${filterType==='sms'?'active':''}" onclick="setFilter('sms')"><h3>${stats.sms}</h3><p>SMS</p></div>
        <div class="stat-card ${filterType==='whatsapp'?'active':''}" onclick="setFilter('whatsapp')"><h3>${stats.whatsapp}</h3><p>WhatsApp</p></div>
        <div class="stat-card ${filterType==='meet'?'active':''}" onclick="setFilter('meet')"><h3>${stats.meet}</h3><p>Meetings</p></div>
        <div class="stat-card ${filterType==='deskwork'?'active':''}" onclick="setFilter('deskwork')"><h3>${stats.deskwork}</h3><p>Deskwork</p></div>`;
    }

    function setFilter(type) { filterType = type; renderStats(); renderReminders(); }

    function renderReminders() {
      const filtered = filterType ? reminders.filter(r => r.reminder_type === filterType) : reminders;
      document.getElementById('filterInfo').innerHTML = filterType ? `<button class="btn btn-secondary" onclick="setFilter(null)">Clear: ${filterType.toUpperCase()}</button>` : '';
      if (!filtered.length) { document.getElementById('reminderList').innerHTML = '<div class="empty-state"><h3>No reminders</h3><p>Create one using the button above</p></div>'; return; }
      document.getElementById('reminderList').innerHTML = `<div class="reminder-list">${filtered.map(r => `
        <div class="reminder-card">
          <div class="reminder-header">
            <span class="type-badge ${r.reminder_type}">${r.reminder_type}</span>
            <div class="reminder-actions">
              ${r.reminder_type==='whatsapp'&&r.contact_phone?`<button class="btn btn-success" onclick="openWA('${r.contact_phone}','${(r.notes||'').replace(/'/g,"\\'")}')">Send WA</button>`:''}
              ${r.reminder_type==='call'&&r.contact_phone?`<button class="btn btn-success" onclick="window.location.href='tel:${r.contact_phone}'">Call</button>`:''}
              <button class="btn btn-secondary" onclick="openModal('${r.id}')">Edit</button>
              <button class="btn btn-danger" onclick="deleteReminder('${r.id}')">Delete</button>
            </div>
          </div>
          <div class="reminder-title">${r.title||'Untitled'}</div>
          ${r.contact_name?`<div class="reminder-meta">Contact: ${r.contact_name}${r.contact_phone?' • '+r.contact_phone:''}</div>`:''}
          <div class="reminder-meta">Scheduled: ${new Date(r.scheduled_time).toLocaleString()}</div>
          ${r.notes?`<div class="reminder-notes">${r.notes}</div>`:''}
        </div>`).join('')}</div>`;
    }

    function openWA(phone, msg) {
      let p = phone.replace(/[^0-9]/g,''); if(!p.startsWith('91')&&p.length===10) p='91'+p;
      window.open(`https://wa.me/${p}?text=${encodeURIComponent(msg||'Hello!')}`,'_blank');
    }

    async function deleteReminder(id) {
      if(!confirm('Delete this reminder?')) return;
      try { await fetch(`${API_URL}/reminders/${id}`,{method:'DELETE'}); loadReminders(); } catch(e) { alert('Failed'); }
    }

    function openModal(editId) {
      const r = editId ? reminders.find(x=>x.id===editId) : null;
      const time = r?.scheduled_time ? new Date(r.scheduled_time).toISOString().slice(0,16) : '';
      document.getElementById('modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="closeModal(event)">
          <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header"><h2 class="modal-title">${r?'Edit':'New'} Reminder</h2><button class="modal-close" onclick="closeModal()">&times;</button></div>
            <form id="reminderForm">
              <div class="form-group">
                <label class="form-label">Type</label>
                <div class="type-selector">
                  ${['call','sms','whatsapp','meet','deskwork'].map(t=>`<div class="type-option ${(r?.reminder_type||'call')===t?'selected':''}" onclick="selType(this,'${t}')"><span style="font-size:18px">${t==='call'?'📞':t==='sms'?'💬':t==='whatsapp'?'📱':t==='meet'?'👥':'💻'}</span><span>${t}</span></div>`).join('')}
                </div>
                <input type="hidden" id="rType" value="${r?.reminder_type||'call'}">
              </div>
              <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="rTitle" value="${r?.title||''}" required></div>
              <div class="form-group contact-picker">
                <label class="form-label">Contact</label>
                <input class="form-input" id="rContact" value="${r?.contact_name||''}" placeholder="Search..." autocomplete="off">
                <div class="contact-results hidden" id="cResults"></div>
              </div>
              <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="rPhone" value="${r?.contact_phone||''}"></div>
              <div class="form-group"><label class="form-label">Schedule</label><input type="datetime-local" class="form-input" id="rTime" value="${time}" required></div>
              <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="rNotes">${r?.notes||''}</textarea></div>
              <div style="display:flex;gap:12px;margin-top:24px">
                <button type="submit" class="btn btn-primary" style="flex:1">${r?'Update':'Create'}</button>
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
              </div>
            </form>
          </div>
        </div>`;
      const cInput = document.getElementById('rContact'), cRes = document.getElementById('cResults'), pInput = document.getElementById('rPhone');
      cInput.oninput = () => {
        const q = cInput.value.toLowerCase();
        if(q.length<1){cRes.classList.add('hidden');return;}
        const f = contacts.filter(c=>c.name.toLowerCase().includes(q)||c.phone.includes(q)).slice(0,8);
        if(f.length){cRes.innerHTML=f.map(c=>`<div class="contact-item" onclick="pickContact('${c.name.replace(/'/g,"\\'")}','${c.phone}')"><div class="contact-name">${c.name}</div><div class="contact-phone">${c.phone}</div></div>`).join('');cRes.classList.remove('hidden');}else{cRes.classList.add('hidden');}
      };
      cInput.onblur = () => setTimeout(()=>cRes.classList.add('hidden'),200);
      document.getElementById('reminderForm').onsubmit = async(e) => {
        e.preventDefault();
        const data = { title:document.getElementById('rTitle').value, reminder_type:document.getElementById('rType').value, contact_name:cInput.value, contact_phone:pInput.value, scheduled_time:document.getElementById('rTime').value, notes:document.getElementById('rNotes').value, device_id:deviceId, auto_execute:false };
        try {
          await fetch(r?`${API_URL}/reminders/${r.id}`:`${API_URL}/reminders`,{method:r?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
          closeModal(); loadReminders();
        } catch(e) { alert('Failed to save'); }
      };
    }

    function selType(el,t) { document.querySelectorAll('.type-option').forEach(x=>x.classList.remove('selected')); el.classList.add('selected'); document.getElementById('rType').value=t; }
    function pickContact(n,p) { document.getElementById('rContact').value=n; document.getElementById('rPhone').value=p; document.getElementById('cResults').classList.add('hidden'); }
    function closeModal(e) { if(e&&e.target!==e.currentTarget)return; document.getElementById('modalContainer').innerHTML=''; }

    render();
  </script>
</body>
</html>
